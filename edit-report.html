<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Report - Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <aside class="sidebar">
        <div class="sidebar-rail">
          <div class="sidebar-stack">
            <img
              class="sidebar-logo"
              src="https://www.figma.com/api/mcp/asset/137bd47f-a0c7-4d14-b8d9-b80ce1c24cf1"
              alt="OPS logo"
            />
            <button class="ops-toggle" aria-label="Switch workspace">
              <span>OPS</span>
              <span class="ops-arrows" aria-hidden="true">
                <img class="ops-arrow-icon" src="https://www.figma.com/api/mcp/asset/d3dc8ae2-22a2-410c-8185-59f5f35eed1b" alt="" />
                <img class="ops-arrow-icon is-down" src="https://www.figma.com/api/mcp/asset/d3dc8ae2-22a2-410c-8185-59f5f35eed1b" alt="" />
              </span>
            </button>

            <nav class="sidebar-nav" aria-label="Main navigation">
              <button class="nav-item" aria-label="Dashboard"><img class="nav-icon nav-icon-dashboard" src="https://www.figma.com/api/mcp/asset/ec44bdc8-29e9-4ab4-b655-06355e0eca28" alt="" /></button>
              <button class="nav-item" aria-label="Signal map"><img class="nav-icon" src="https://www.figma.com/api/mcp/asset/6b235b1f-697a-40a9-8369-917e7e7c8b64" alt="" /></button>
              <button class="nav-item" aria-label="Franchises">
                <span class="franchises-icon" aria-hidden="true">
                  <span class="franchises-line stroke-top"></span>
                  <span class="franchises-line stroke-middle"></span>
                  <span class="franchises-line stroke-bottom"></span>
                </span>
              </button>
              <button class="nav-item" aria-label="Dispatch"><img class="nav-icon" src="https://www.figma.com/api/mcp/asset/f73cb3bb-10b9-4583-847f-e0843ac70024" alt="" /></button>
              <button class="nav-item" aria-label="Users"><img class="nav-icon" src="https://www.figma.com/api/mcp/asset/a46c8cc9-78ef-448f-bd3f-5c2975567c48" alt="" /></button>
              <button class="nav-item active" aria-label="Settings"><img class="nav-icon" src="https://www.figma.com/api/mcp/asset/0b486686-2480-4d68-912f-68243e52279e" alt="" /></button>
            </nav>
          </div>
        </div>
        <button class="collapse-btn" aria-label="Collapse sidebar">
          <img class="collapse-icon" src="https://www.figma.com/api/mcp/asset/d3cc0618-bef9-40fe-a937-880edbac4c5e" alt="" />
        </button>
      </aside>

      <div class="content-shell">
        <header class="topbar">
          <div class="title-wrap">
            <span class="title-icon mui-icon">settings</span>
            <h1>Settings</h1>
          </div>
          <div class="profile-wrap">
            <button class="bell-btn" aria-label="Notifications"><span class="mui-icon">notifications</span></button>
            <div class="profile">
              <div class="avatar">A</div>
              <div class="profile-text">
                <strong>Aleena</strong>
                <span>HO User</span>
              </div>
              <span class="chevron mui-icon">expand_more</span>
            </div>
          </div>
        </header>

        <main class="main">
          <section class="edit-report-view" aria-label="Edit Report screen">
            <div class="edit-actions-row">
              <button id="edit-back-btn" class="back-btn">
                <span class="mui-icon">arrow_back</span> Back
              </button>
              <div class="edit-actions-right">
                <button id="edit-cancel-btn" class="btn btn-secondary">Cancel</button>
                <button class="btn btn-primary">Save</button>
              </div>
            </div>
            <div class="edit-divider"></div>

            <div class="edit-form-shell">
              <section class="edit-card report-card">
                <label class="field-label">Report Name</label>
                <div class="text-input">Vehicle Inspection Report</div>
                <button class="add-description-btn">
                  <span class="mui-icon">add</span> Add Description
                </button>
                <div id="report-dropdowns-root" class="report-dropdowns-row"></div>
              </section>

              <section class="edit-card section-card">
                <div class="section-subcard">
                  <label class="field-label">Section Name</label>
                  <div class="text-input">Section for questions</div>
                  <button class="add-description-btn">
                    <span class="mui-icon">add</span> Add Description
                  </button>
                </div>

                <div class="question-subcard">
                  <label class="field-label required">Question Statement</label>
                  <div class="text-input">Was the car locked?</div>
                  <button class="add-description-btn">
                    <span class="mui-icon">add</span> Add Description
                  </button>

                  <label class="field-label required">Answer Type</label>
                  <div class="select-input">Multiple choice <span class="mui-icon">expand_more</span></div>

                  <div class="option-row"><span>Yes</span><button class="icon-btn danger"><span class="mui-icon">delete</span></button></div>
                  <div class="option-row"><span>No</span><button class="icon-btn danger"><span class="mui-icon">delete</span></button></div>
                  <div class="option-row"><span>Maybe</span><button class="icon-btn danger"><span class="mui-icon">delete</span></button></div>

                  <button class="btn btn-outline-brand"><span class="mui-icon">add</span> Add option</button>

                  <div class="question-footer">
                    <label class="required-check">
                      <input type="checkbox" />
                      <span>Required</span>
                    </label>
                    <button class="btn btn-danger-outline">
                      <span class="mui-icon">delete</span> Delete
                    </button>
                  </div>
                </div>
              </section>
            </div>
          </section>
        </main>
      </div>
    </div>
    <script type="module" src="./edit-report-dropdowns.jsx"></script>
    <script>
      const editBackBtn = document.getElementById("edit-back-btn");
      const editCancelBtn = document.getElementById("edit-cancel-btn");

      function navigateBackToList() {
        window.location.href = "./index.html";
      }

      editBackBtn.addEventListener("click", navigateBackToList);
      editCancelBtn.addEventListener("click", navigateBackToList);
    </script>
  </body>
</html>
