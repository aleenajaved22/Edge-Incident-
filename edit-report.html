<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Report - Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <aside class="sidebar">
        <div class="sidebar-rail">
          <div class="sidebar-stack">
            <img
              class="sidebar-logo"
              src="https://www.figma.com/api/mcp/asset/42f6326d-51ba-4a2d-8521-24c13756fd8d"
              alt="OPS logo"
            />
            <button class="ops-toggle" aria-label="Switch workspace">
              <span>OPS</span>
              <span class="ops-arrows">
                <span class="mui-icon">keyboard_arrow_up</span>
                <span class="mui-icon">keyboard_arrow_down</span>
              </span>
            </button>

            <nav class="sidebar-nav" aria-label="Main navigation">
              <button class="nav-item" aria-label="Dashboard"><span class="mui-icon">home</span></button>
              <button class="nav-item" aria-label="Signal map"><span class="mui-icon">public</span></button>
              <button class="nav-item" aria-label="Franchises"><span class="mui-icon">layers</span></button>
              <button class="nav-item" aria-label="Dispatch"><span class="mui-icon">notifications</span></button>
              <button class="nav-item" aria-label="Users"><span class="mui-icon">person</span></button>
              <button class="nav-item active" aria-label="Settings"><span class="mui-icon">settings</span></button>
            </nav>
          </div>
        </div>
        <button class="collapse-btn" aria-label="Collapse sidebar">
          <span class="mui-icon">last_page</span>
        </button>
      </aside>

      <div class="content-shell">
        <header class="topbar">
          <div class="title-wrap">
            <span class="title-icon mui-icon">settings</span>
            <h1>Settings</h1>
          </div>
          <div class="profile-wrap">
            <button class="bell-btn" aria-label="Notifications"><span class="mui-icon">notifications</span></button>
            <div class="profile">
              <div class="avatar">A</div>
              <div class="profile-text">
                <strong>Aleena</strong>
                <span>HO User</span>
              </div>
              <span class="chevron mui-icon">expand_more</span>
            </div>
          </div>
        </header>

        <main class="main">
          <section class="edit-report-view" aria-label="Edit Report screen">
            <div class="edit-actions-row">
              <button id="edit-back-btn" class="back-btn">
                <span class="mui-icon">arrow_back</span> Back
              </button>
              <div class="edit-actions-right">
                <button id="edit-cancel-btn" class="btn btn-secondary">Cancel</button>
                <button class="btn btn-primary">Save</button>
              </div>
            </div>
            <div class="edit-divider"></div>

            <div class="edit-form-shell">
              <section class="edit-card report-card">
                <label class="field-label">Report Name</label>
                <div class="text-input">Vehicle Inspection Report</div>
                <button class="add-description-btn">
                  <span class="mui-icon">add</span> Add Description
                </button>
                <div class="report-dropdowns-row">
                  <div class="report-type-dropdown">
                    <label class="field-label">Report Type</label>
                    <button
                      id="report-type-trigger"
                      class="select-input report-type-trigger"
                      aria-haspopup="listbox"
                      aria-expanded="false"
                    >
                      <span id="report-type-value">Incident Report</span>
                      <span class="mui-icon">expand_more</span>
                    </button>
                    <div id="report-type-menu" class="report-type-menu is-hidden" role="listbox">
                      <button class="report-type-option" role="option" data-value="Incident Report">Incident Report</button>
                      <button class="report-type-option" role="option" data-value="Activity Report">Activity Report</button>
                    </div>
                  </div>

                  <div id="category-dropdown" class="report-type-dropdown is-hidden">
                    <label class="field-label">Category</label>
                    <button
                      id="category-trigger"
                      class="select-input report-type-trigger"
                      aria-haspopup="listbox"
                      aria-expanded="false"
                    >
                      <span id="category-value">Operations</span>
                      <span class="mui-icon">expand_more</span>
                    </button>
                    <div id="category-menu" class="report-type-menu is-hidden" role="listbox">
                      <button class="category-option" role="option" data-value="Operations">Operations</button>
                      <button class="category-option" role="option" data-value="Compliance">Compliance</button>
                      <button class="category-option" role="option" data-value="Security">Security</button>
                    </div>
                  </div>
                </div>
              </section>

              <section class="edit-card section-card">
                <div class="section-subcard">
                  <label class="field-label">Section Name</label>
                  <div class="text-input">Section for questions</div>
                  <button class="add-description-btn">
                    <span class="mui-icon">add</span> Add Description
                  </button>
                </div>

                <div class="question-subcard">
                  <label class="field-label required">Question Statement</label>
                  <div class="text-input">Was the car locked?</div>
                  <button class="add-description-btn">
                    <span class="mui-icon">add</span> Add Description
                  </button>

                  <label class="field-label required">Answer Type</label>
                  <div class="select-input">Multiple choice <span class="mui-icon">expand_more</span></div>

                  <div class="option-row"><span>Yes</span><button class="icon-btn danger"><span class="mui-icon">delete</span></button></div>
                  <div class="option-row"><span>No</span><button class="icon-btn danger"><span class="mui-icon">delete</span></button></div>
                  <div class="option-row"><span>Maybe</span><button class="icon-btn danger"><span class="mui-icon">delete</span></button></div>

                  <button class="btn btn-outline-brand"><span class="mui-icon">add</span> Add option</button>

                  <div class="question-footer">
                    <label class="required-check">
                      <input type="checkbox" />
                      <span>Required</span>
                    </label>
                    <button class="btn btn-danger-outline">
                      <span class="mui-icon">delete</span> Delete
                    </button>
                  </div>
                </div>
              </section>
            </div>
          </section>
        </main>
      </div>
    </div>
    <script>
      const editBackBtn = document.getElementById("edit-back-btn");
      const editCancelBtn = document.getElementById("edit-cancel-btn");
      const reportTypeTrigger = document.getElementById("report-type-trigger");
      const reportTypeMenu = document.getElementById("report-type-menu");
      const reportTypeValue = document.getElementById("report-type-value");
      const reportTypeOptions = document.querySelectorAll(".report-type-option");
      const categoryDropdown = document.getElementById("category-dropdown");
      const categoryTrigger = document.getElementById("category-trigger");
      const categoryMenu = document.getElementById("category-menu");
      const categoryValue = document.getElementById("category-value");
      const categoryOptions = document.querySelectorAll(".category-option");

      function navigateBackToList() {
        window.location.href = "./index.html";
      }

      editBackBtn.addEventListener("click", navigateBackToList);
      editCancelBtn.addEventListener("click", navigateBackToList);

      function closeReportTypeMenu() {
        reportTypeMenu.classList.add("is-hidden");
        reportTypeTrigger.setAttribute("aria-expanded", "false");
      }

      function closeCategoryMenu() {
        categoryMenu.classList.add("is-hidden");
        categoryTrigger.setAttribute("aria-expanded", "false");
      }

      reportTypeTrigger.addEventListener("click", () => {
        const willOpen = reportTypeMenu.classList.contains("is-hidden");
        reportTypeMenu.classList.toggle("is-hidden", !willOpen);
        reportTypeTrigger.setAttribute("aria-expanded", String(willOpen));
      });

      reportTypeOptions.forEach((option) => {
        option.addEventListener("click", () => {
          reportTypeValue.textContent = option.dataset.value;
          const showCategory = option.dataset.value === "Incident Report";
          categoryDropdown.classList.toggle("is-hidden", !showCategory);
          if (!showCategory) {
            closeCategoryMenu();
          }
          closeReportTypeMenu();
        });
      });

      categoryTrigger.addEventListener("click", () => {
        const willOpen = categoryMenu.classList.contains("is-hidden");
        categoryMenu.classList.toggle("is-hidden", !willOpen);
        categoryTrigger.setAttribute("aria-expanded", String(willOpen));
      });

      categoryOptions.forEach((option) => {
        option.addEventListener("click", () => {
          categoryValue.textContent = option.dataset.value;
          closeCategoryMenu();
        });
      });

      document.addEventListener("click", (event) => {
        if (!reportTypeTrigger.contains(event.target) && !reportTypeMenu.contains(event.target)) {
          closeReportTypeMenu();
        }
        if (!categoryTrigger.contains(event.target) && !categoryMenu.contains(event.target)) {
          closeCategoryMenu();
        }
      });

      categoryDropdown.classList.toggle("is-hidden", reportTypeValue.textContent.trim() !== "Incident Report");
    </script>
  </body>
</html>
